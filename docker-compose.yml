services:
  pocket-dl:
    # Build locally if the image is not found
    build: .
    # Official image from GitHub Container Registry (matching the repo name lowercase)
    image: ghcr.io/jessepesse/pocketdl:latest
    pull_policy: always
    container_name: pocket-dl
    ports:
      - "5050:5050"
    volumes:
      - ./downloads:/app/downloads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    environment:
      - PORT=5050
      - DOWNLOAD_DIR=/app/downloads
      - MIN_DISK_SPACE_GB=2
      - MAX_CONCURRENT_DOWNLOADS=3
