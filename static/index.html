<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketDL</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #f00;
            --on-primary: #fff;
            --secondary: #03dac6;
            --text: #e1e1e1;
            --text-secondary: #aaa;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--surface);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 32px;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            background-color: #2c2c2c;
            border: 2px solid #3d3d3d;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-label {
            display: block;
            padding: 12px;
            text-align: center;
            background-color: #2c2c2c;
            border: 2px solid #3d3d3d;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option input:checked + .radio-label {
            background-color: rgba(255, 0, 0, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status-container {
            margin-top: 32px;
            display: none;
            padding: 16px;
            background: #2c2c2c;
            border-radius: 12px;
        }

        .progress-bar {
            height: 12px;
            background-color: #121212;
            border-radius: 6px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 14px;
            text-align: center;
            color: var(--text-secondary);
        }

        .download-link {
            display: block;
            text-align: center;
            padding: 16px;
            background-color: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .cancel-btn {
            background-color: #333;
            font-size: 14px;
            padding: 8px;
            margin-top: 12px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .video-title {
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PocketDL</h1>
        
        <div class="form-group">
            <label for="url">Media Link</label>
            <input type="text" id="url" placeholder="Paste YouTube, TikTok, X... URL here" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Format</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" name="format" value="video" id="fmt-video" checked>
                    <label for="fmt-video" class="radio-label">Video (MP4)</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="format" value="audio" id="fmt-audio">
                    <label for="fmt-audio" class="radio-label">Music (MP3)</label>
                </div>
            </div>
        </div>

        <button id="downloadBtn">Start Download</button>

        <div id="status-container">
            <div id="videoTitle" class="video-title"></div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="stats">
                <span id="speedText">Speed: 0 KB/s</span>
                <span id="etaText">ETA: N/A</span>
            </div>
            <div id="statusText" class="status-text" style="margin-top:10px">Preparing...</div>
            <button id="cancelBtn" class="cancel-btn">Cancel Download</button>
            <div id="downloadAction"></div>
        </div>

        <div id="footer" class="footer"></div>

        <div id="history-container" style="margin-top: 40px; display: none;">
            <h2 style="font-size: 18px; color: var(--text-secondary); margin-bottom: 16px; border-bottom: 1px solid #333; padding-bottom: 8px;">Recent Downloads</h2>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusContainer = document.getElementById('status-container');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const speedText = document.getElementById('speedText');
        const etaText = document.getElementById('etaText');
        const videoTitle = document.getElementById('videoTitle');
        const downloadAction = document.getElementById('downloadAction');
        const cancelBtn = document.getElementById('cancelBtn');
        const historyContainer = document.getElementById('history-container');
        const historyList = document.getElementById('history-list');

        let currentJobId = null;
        let pollInterval = null;

        async function fetchHistory() {
            try {
                const res = await fetch('/history');
                const files = await res.json();
                if (files.length > 0) {
                    historyContainer.style.display = 'block';
                    historyList.innerHTML = '';
                    files.forEach(file => {
                        const item = document.createElement('div');
                        item.style.backgroundColor = '#2c2c2c';
                        item.style.padding = '12px';
                        item.style.borderRadius = '8px';
                        item.style.marginBottom = '10px';
                        item.style.display = 'flex';
                        item.style.justifyContent = 'space-between';
                        item.style.alignItems = 'center';
                        
                        const info = document.createElement('div');
                        info.style.flex = '1';
                        info.style.marginRight = '10px';
                        info.style.overflow = 'hidden';
                        
                        const title = document.createElement('div');
                        title.textContent = file.filename;
                        title.style.fontSize = '13px';
                        title.style.fontWeight = 'bold';
                        title.style.whiteSpace = 'nowrap';
                        title.style.textOverflow = 'ellipsis';
                        title.style.overflow = 'hidden';
                        
                        const meta = document.createElement('div');
                        meta.textContent = `${file.format.toUpperCase()} • ${file.size} MB`;
                        meta.style.fontSize = '11px';
                        meta.style.color = 'var(--text-secondary)';
                        
                        info.appendChild(title);
                        info.appendChild(meta);
                        
                        const dlBtn = document.createElement('button');
                        dlBtn.textContent = 'Save';
                        dlBtn.style.width = 'auto';
                        dlBtn.style.padding = '6px 12px';
                        dlBtn.style.fontSize = '12px';
                        dlBtn.style.marginTop = '0';
                        dlBtn.style.backgroundColor = '#3d3d3d';
                        dlBtn.onclick = () => {
                            window.open(`/files/history/${encodeURIComponent(file.filename)}`, '_blank');
                        };

                        const delBtn = document.createElement('button');
                        delBtn.textContent = '×';
                        delBtn.title = 'Delete file';
                        delBtn.style.width = 'auto';
                        delBtn.style.padding = '6px 10px';
                        delBtn.style.fontSize = '16px';
                        delBtn.style.marginTop = '0';
                        delBtn.style.marginLeft = '6px';
                        delBtn.style.backgroundColor = '#3d3d3d';
                        delBtn.style.color = '#ff4444';
                        delBtn.onclick = async () => {
                            await fetch(`/files/history/${encodeURIComponent(file.filename)}`, { method: 'DELETE' });
                            fetchHistory();
                        };

                        item.appendChild(info);
                        item.appendChild(dlBtn);
                        item.appendChild(delBtn);
                        historyList.appendChild(item);
                    });
                } else {
                    historyContainer.style.display = 'none';
                }
            } catch (err) { console.error("History error", err); }
        }

        async function startDownload() {
            const url = urlInput.value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            if (!url) return alert("Please enter a URL!");

            statusContainer.style.display = 'block';
            progressFill.style.width = '0%';
            statusText.innerHTML = '<div class="spinner"></div> Connecting...';
            speedText.textContent = 'Speed: 0 KB/s';
            etaText.textContent = 'ETA: N/A';
            downloadAction.innerHTML = '';
            videoTitle.textContent = '';
            downloadBtn.disabled = true;
            cancelBtn.style.display = 'block';

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format })
                });
                const data = await res.json();
                if (res.ok) {
                    currentJobId = data.job_id;
                    startPolling();
                } else {
                    alert("Error: " + data.error);
                    statusContainer.style.display = 'none';
                    downloadBtn.disabled = false;
                }
            } catch (err) {
                alert("Connection error!");
                downloadBtn.disabled = false;
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${currentJobId}`);
                    const data = await res.json();

                    if (data.status === 'downloading') {
                        statusText.textContent = `Downloading... ${Math.round(data.progress)}%`;
                        progressFill.style.width = data.progress + '%';
                        speedText.textContent = `Speed: ${data.speed}`;
                        etaText.textContent = `ETA: ${data.eta}`;
                    } else if (data.status === 'finished') {
                        clearInterval(pollInterval);
                        statusText.textContent = "Done!";
                        progressFill.style.width = '100%';
                        downloadBtn.disabled = false;
                        cancelBtn.style.display = 'none';
                        
                        const link = document.createElement('a');
                        link.href = `/files/${currentJobId}/${encodeURIComponent(data.filename)}`;
                        link.className = 'download-link';
                        link.textContent = 'Save to Device';
                        link.target = '_blank';
                        downloadAction.appendChild(link);
                        fetchHistory();
                    } else if (data.status === 'cancelled') {
                        clearInterval(pollInterval);
                        statusText.textContent = "Cancelled.";
                        downloadBtn.disabled = false;
                        cancelBtn.style.display = 'none';
                    } else if (data.status === 'error') {
                        clearInterval(pollInterval);
                        statusText.textContent = "Error: " + data.error;
                        downloadBtn.disabled = false;
                        cancelBtn.style.display = 'none';
                    }
                } catch (err) { console.error("Polling error", err); }
            }, 1000);
        }

        cancelBtn.onclick = async () => {
            if (!currentJobId) return;
            await fetch(`/cancel/${currentJobId}`, { method: 'POST' });
        };

        downloadBtn.addEventListener('click', startDownload);
        fetchHistory();

        fetch('/version').then(r => r.json()).then(v => {
            document.getElementById('footer').textContent = `PocketDL v${v.app} • yt-dlp ${v.ytdlp}`;
        });
    </script>
</body>
</html>
